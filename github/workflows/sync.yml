name: Sync to Hugging Face hub
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to hub
        env:
          HF_TOKEN: ${{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 }}
        run: |
          # Replace HF_USERNAME and SPACE_NAME with your actual details
          git push --force https://AzizMiladi:$HF_TOKEN@huggingface.co/spaces/AzizMiladi/Guichet_PAR main